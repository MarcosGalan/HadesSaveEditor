name: Build HadesEditor Binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "hadeseditor" main.py

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: hadeseditor-windows
          path: dist/hadeseditor.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "hadeseditor" main.py

      - name: Create Mac DMG
        run: |
          hdiutil create -volname "HadesEditor" -srcfolder dist/hadeseditor.app -ov -format UDZO hadeseditor.dmg

      - name: Upload Mac Binary
        uses: actions/upload-artifact@v4
        with:
          name: hadeseditor-mac
          path: hadeseditor.dmg

  generate-release:
    needs: [build-windows, build-mac]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/hadeseditor-windows/hadeseditor.exe
            binaries/hadeseditor-mac/hadeseditor.dmg
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('HadesEditor v1.38 (Build {0})', github.run_number) }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v1.38-b{0}', github.run_number) }}
          body: |
            Descarga la última versión de HadesEditor para Windows (EXE) y Mac (DMG).
            
            **Compatible con Hades v1.38+**
            
            ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'Este es un build automático de la última versión en desarrollo.' || '' }}
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
